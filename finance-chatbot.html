<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinWise — Personal Finance Expert</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0e0f; --surface: #111516; --surface2: #181d1e; --border: #1f2729;
    --gold: #c9a84c; --gold-dim: #7a6330; --gold-glow: rgba(201,168,76,0.12);
    --text: #e8e2d5; --text-dim: #7a7368; --text-muted: #3f3d39; --green: #4caf7a;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 18px 28px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 34px; height: 34px; background: linear-gradient(135deg, var(--gold), #8a6a20); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .logo-name { font-family: 'DM Serif Display', serif; font-size: 1.35rem; letter-spacing: -0.02em; }
  .logo-name span { color: var(--gold); }
  .status { display: flex; align-items: center; gap: 7px; font-size: 0.75rem; color: var(--text-dim); font-family: 'DM Mono', monospace; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .chat-area { flex: 1; overflow-y: auto; padding: 28px 0; display: flex; flex-direction: column; scroll-behavior: smooth; }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .message-row { display: flex; padding: 10px 28px; gap: 14px; animation: fadeUp 0.3s ease forwards; opacity: 0; }
  .message-row.user { flex-direction: row-reverse; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .avatar { width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; margin-top: 2px; }
  .avatar.ai { background: linear-gradient(135deg, var(--gold), #8a6a20); color: #1a1208; font-family: 'DM Serif Display', serif; }
  .avatar.user { background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); }
  .bubble { max-width: 72%; padding: 13px 17px; border-radius: 14px; font-size: 0.9rem; line-height: 1.65; font-weight: 300; }
  .bubble.ai { background: var(--surface2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .bubble.user { background: var(--gold-glow); border: 1px solid var(--gold-dim); border-bottom-right-radius: 4px; }
  .bubble strong { color: var(--gold); font-weight: 500; }
  .suggestions { padding: 0 28px 20px; display: flex; flex-wrap: wrap; gap: 8px; animation: fadeUp 0.4s ease 0.2s forwards; opacity: 0; }
  .suggestion-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); padding: 7px 14px; border-radius: 20px; font-size: 0.78rem; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.2s; }
  .suggestion-btn:hover { border-color: var(--gold-dim); color: var(--gold); background: var(--gold-glow); }
  .input-area { border-top: 1px solid var(--border); padding: 18px 28px; background: var(--surface); display: flex; gap: 12px; align-items: flex-end; flex-shrink: 0; }
  textarea { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 300; padding: 12px 16px; border-radius: 12px; resize: none; outline: none; min-height: 46px; max-height: 120px; transition: border-color 0.2s; line-height: 1.5; }
  textarea:focus { border-color: var(--gold-dim); }
  textarea::placeholder { color: var(--text-muted); }
  .send-btn { width: 46px; height: 46px; border-radius: 12px; background: linear-gradient(135deg, var(--gold), #8a6a20); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.2s, transform 0.1s; }
  .send-btn:hover { opacity: 0.88; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .send-btn svg { width: 18px; height: 18px; fill: #1a1208; }
  .typing { display: flex; gap: 5px; align-items: center; padding: 14px 18px; }
  .typing span { width: 6px; height: 6px; background: var(--gold-dim); border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:0.4} 40%{transform:translateY(-5px);opacity:1} }
  .disclaimer { text-align: center; font-size: 0.68rem; color: var(--text-muted); padding: 6px 0 2px; font-family: 'DM Mono', monospace; }
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">₿</div>
    <div class="logo-name">Fin<span>Wise</span></div>
  </div>
  <div class="status"><div class="status-dot"></div>AI Expert Online</div>
</header>

<div class="chat-area" id="chatArea"></div>

<div class="input-area">
  <textarea id="msgInput" rows="1" placeholder="Ask me anything about money..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
  </button>
</div>
<div class="disclaimer">FinWise is an AI demo — not licensed financial advice.</div>

<script>
const SYSTEM_PROMPT = `You are FinWise, a highly knowledgeable and friendly personal finance expert. Help users with budgeting, investing, debt, retirement planning, tax strategies, and building wealth.
- Give practical, actionable advice with real numbers and examples
- Use clear language; avoid jargon unless the user seems experienced
- Be warm, encouraging, and non-judgmental
- Use **bold** for key terms or important numbers
- Keep responses concise but complete`;

const SUGGESTIONS = [
  "How do I start investing with $500?",
  "Best way to pay off credit card debt?",
  "Explain index funds simply",
  "How much emergency fund do I need?",
  "Roth IRA vs Traditional IRA?",
  "50/30/20 budget rule explained"
];

let messages = [];
let isLoading = false;

window.onload = () => {
  addAIMessage("Hello! I'm **FinWise**, your personal finance expert. I can help with budgeting, investing, debt, retirement planning, and more.\n\nWhat's on your financial mind today?");
  addSuggestions();
  document.getElementById('msgInput').focus();
};

function format(text) {
  return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
}

function addAIMessage(text) {
  const area = document.getElementById('chatArea');
  const row = document.createElement('div');
  row.className = 'message-row';
  row.innerHTML = `<div class="avatar ai">F</div><div class="bubble ai">${format(text)}</div>`;
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

function addUserMessage(text) {
  const area = document.getElementById('chatArea');
  const row = document.createElement('div');
  row.className = 'message-row user';
  row.innerHTML = `<div class="avatar user">You</div><div class="bubble user">${format(text)}</div>`;
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

function addSuggestions() {
  const area = document.getElementById('chatArea');
  const sug = document.createElement('div');
  sug.className = 'suggestions'; sug.id = 'suggestions';
  sug.innerHTML = SUGGESTIONS.map(s => `<button class="suggestion-btn" onclick="sendSuggestion('${s}')">${s}</button>`).join('');
  area.appendChild(sug);
}

function sendSuggestion(text) {
  document.getElementById('suggestions')?.remove();
  document.getElementById('msgInput').value = text;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const row = document.createElement('div');
  row.id = 'typingRow'; row.className = 'message-row';
  row.innerHTML = `<div class="avatar ai">F</div><div class="bubble ai"><div class="typing"><span></span><span></span><span></span></div></div>`;
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

function hideTyping() { document.getElementById('typingRow')?.remove(); }

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  document.getElementById('suggestions')?.remove();
  input.value = ''; input.style.height = 'auto';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  addUserMessage(text);
  messages.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages
      })
    });

    const data = await res.json();
    hideTyping();

    if (data.error) {
      addAIMessage(`⚠️ ${data.error.message}`);
    } else {
      const reply = data.content[0].text;
      messages.push({ role: 'assistant', content: reply });
      addAIMessage(reply);
    }
  } catch(err) {
    hideTyping();
    addAIMessage('⚠️ Something went wrong. Please try again.');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}
</script>
</body>
</html>
